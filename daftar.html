<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIONBLU | Daftar Akun</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="bg-gradient-animation"></div>

    <div class="auth-container">
        <div class="glass-card auth-box">
            <div class="brand-header">
                <h1 class="neon-text">XIONBLU</h1>
                <p>Buat Akun Baru</p>
            </div>

            <form id="formDaftar" class="auth-form">
                <div class="row-input">
                    <div class="input-group half">
                        <label><i class="fas fa-user-circle"></i> Username</label>
                        <input type="text" id="regUser" placeholder="Nama pengguna unik" required>
                    </div>
                    <div class="input-group half">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="regEmail" placeholder="email@kamu.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-phone"></i> Nomor WhatsApp</label>
                    <input type="tel" id="regHp" placeholder="0812xxxxxxx" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Kata Sandi</label>
                    <input type="password" id="regPass" placeholder="Minimal 6 karakter" required minlength="6">
                    <span class="eye-toggle" id="toggleReg1">
                        <i class="fas fa-eye-slash"></i>
                    </span>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-shield-alt"></i> Ulangi Sandi</label>
                    <input type="password" id="regPass2" placeholder="Ulangi kata sandi" required minlength="6">
                    <span class="eye-toggle" id="toggleReg2">
                        <i class="fas fa-eye-slash"></i>
                    </span>
                </div>

                <div class="alert-box" id="alertDaftar"></div>

                <button type="submit" class="btn-primary neon-border w-100">
                    DAFTAR AKUN
                </button>

                <div class="auth-link">
                    Sudah punya akun? <a href="login.html" class="neon-text">Login di sini</a>
                </div>
            </form>
        </div>
        <p class="copyright">© 2026 XIONBLU </p>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
