<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIONBLU | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="bg-gradient-animation"></div>

    <div class="auth-container">
        <div class="glass-card auth-box">
            <div class="brand-header">
                <h1 class="neon-text">XIONBLU</h1>
                <p>Panel Member Premium</p>
            </div>

            <form id="formLogin" class="auth-form">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Username / Email</label>
                    <input type="text" id="loginUser" placeholder="Masukkan identitas kamu" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Kata Sandi</label>
                    <input type="password" id="loginPass" placeholder="Masukkan kata sandi" required>
                    <span class="eye-toggle" id="toggleLogin">
                        <i class="fas fa-eye-slash"></i>
                    </span>
                </div>

                <div class="alert-box" id="alertLogin"></div>

                <button type="submit" class="btn-primary neon-border w-100">
                    MASUK SEKARANG
                </button>

                <div class="auth-link">
                    Belum punya akun? <a href="daftar.html" class="neon-text">Daftar Gratis</a>
                </div>
            </form>
        </div>
        <p class="copyright">Â© 2026 XIONBLU </p>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
